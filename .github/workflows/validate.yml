name: Perfume Validator

on:
  # Manual trigger via GitHub UI
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Path to CSV file in repo (e.g., data/items.csv)'
        required: true
        default: 'data/items.csv'
      max_items:
        description: 'Max items to process (0 for all)'
        required: false
        default: '0'

  # Auto-trigger strictly on any case variation of data/items.csv pushes
  push:
    branches: [main, develop]
    paths:
      - 'data/items.csv'
      - 'data/items.CSV'
      - 'data/ITEMS.CSV'
      - 'data/Items.csv'
      - 'scripts/**/*.py'
      - 'src/**/*.py'
      - 'requirements.txt'
      - '.github/workflows/validator.yml'

  # Scheduled validation (daily at 2 AM UTC)
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  OUTPUT_DIR: output
  ARTIFACT_RETENTION: 30

jobs:
  validate:
    name: Validate Inventory
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: read
      checks: write
    
    outputs:
      csv_file: ${{ steps.validate.outputs.csv_file }}
      items_processed: ${{ steps.validate.outputs.items_processed }}
      status: ${{ job.status }}

    steps:
      # =====================================================================
      # SETUP
      # =====================================================================

      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      # =====================================================================
      # VALIDATION
      # =====================================================================

      - name: ✅ Run validator
        id: validate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          # Dynamically mapped from your repository secrets/variables configurations
          GMAIL_USER: ${{ secrets.GMAIL_USER || vars.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL || vars.NOTIFY_EMAIL }}
        run: |
          set -e  # Exit on error
          
          INPUT_PATH="${{ github.event.inputs.csv_file || 'data/items.csv' }}"
          DIR_NAME=$(dirname "$INPUT_PATH")
          BASE_NAME=$(basename "$INPUT_PATH")
          
          echo "🔍 Searching case-insensitively for target file matching: $BASE_NAME inside $DIR_NAME/"
          
          # Find file completely case-insensitively (-iname flags process variants like items.CSV)
          TARGET_FILE=$(find "$DIR_NAME" -maxdepth 1 -iname "$BASE_NAME" | head -n 1)
          
          # Fallback check if find yielded nothing
          if [ -z "$TARGET_FILE" ] || [ ! -f "$TARGET_FILE" ]; then
            echo "❌ Target file not found case-insensitively using metadata path: $INPUT_PATH"
            exit 1
          fi
          
          echo "📋 Validating Case-Matched Target: $TARGET_FILE"
          
          MAX_ITEMS="${{ github.event.inputs.max_items || '0' }}"
          
          # Build standard script execution string strictly using accepted script arguments
          CMD="python3 scripts/test_local.py '$TARGET_FILE' --output-dir ${{ env.OUTPUT_DIR }}"
          
          if [ "$MAX_ITEMS" != "0" ] && [ "$MAX_ITEMS" != "" ]; then
            CMD="$CMD --max-items $MAX_ITEMS"
          fi
          
          # Run verification engine
          echo "🚀 Executing pipeline: $CMD"
          eval $CMD
          
          # Export contextual step metadata back to workflow runners
          ITEM_COUNT=$(wc -l < "${{ env.OUTPUT_DIR }}/test_output.csv" || echo "0")
          echo "items_processed=$((ITEM_COUNT - 1))" >> $GITHUB_OUTPUT
          echo "csv_file=$TARGET_FILE" >> $GITHUB_OUTPUT
          
          echo "✅ Validation completed successfully"
        shell: bash

      # =====================================================================
      # ARTIFACT HANDLING
      # =====================================================================

      - name: 📊 Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}/test_output.csv
          retention-days: ${{ env.ARTIFACT_RETENTION }}
          if-no-files-found: warn

      - name: 📂 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs-${{ github.run_number }}
          path: |
            validation.log
            *.log
          retention-days: ${{ env.ARTIFACT_RETENTION }}
          if-no-files-found: ignore

      # =====================================================================
      # RESULTS PROCESSING
      # =====================================================================

      - name: 📈 Generate summary
        if: always() && steps.validate.outcome == 'success'
        run: |
          echo "## ✅ Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- CSV File Resolved: \`${{ steps.validate.outputs.csv_file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Items Processed: ${{ steps.validate.outputs.items_processed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Success" >> $GITHUB_STEP_SUMMARY

      - name: 📉 Generate failure summary
        if: always() && steps.validate.outcome != 'success'
        run: |
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Error Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Review logs in [Actions](../../actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      # =====================================================================
      # COMMIT BACK TO REPO
      # =====================================================================

      - name: 💾 Commit results back to repo
        if: github.event_name == 'push' && steps.validate.outcome == 'success'
        continue-on-error: true
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ${{ env.OUTPUT_DIR }}/test_output.csv
          
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          ITEMS=${{ steps.validate.outputs.items_processed }}
          COMMIT_MSG="✅ Auto-validation: Processed $ITEMS items - $TIMESTAMP"
          
          git commit -m "$COMMIT_MSG" && git push origin HEAD:${{ github.ref }} || echo "⚠️ No changes to commit or branch is protected."

  # =========================================================================
  # REPORTING JOB
  # =========================================================================

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: always()
    needs: validate
    
    permissions:
      contents: read
      checks: write

    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: validation-results-${{ github.run_number }}
          path: results

      - name: 📊 Create check run
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.validate.outputs.status }}';
            const conclusion = status === 'success' ? 'success' : 'failure';
            
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Perfume Validator',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'Validation ' + (conclusion === 'success' ? '✅ Passed' : '❌ Failed'),
                summary: 'Items Processed: ${{ needs.validate.outputs.items_processed }}',
                text: 'See artifacts for detailed results'
              }
            });

  # =========================================================================
  # CLEANUP JOB
  # =========================================================================

  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    permissions:
      actions: write

    steps:
      - name: 🗑️ Delete old artifacts (> 30 days)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const now = new Date();
            const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < thirtyDaysAgo) {
                console.log(`Deleting artifact: ${artifact.name}`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }